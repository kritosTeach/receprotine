<!DOCTYPE html>
<html>
<head>
    <title>Admin - Add Recipe</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #fffaf5; padding: 50px; }
        .form-card { max-width: 600px; margin: auto; background: #fff7ef; padding: 40px; border-radius: 32px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 15px; border: 1px solid #e2cbb4; border-radius: 20px; margin-bottom: 20px; box-sizing: border-box; }
        textarea { height: 150px; resize: vertical; }
        .btn { background: #e67e22; color: white; padding: 15px 30px; border: none; border-radius: 40px; font-weight: 600; cursor: pointer; width: 100%; font-size: 16px; }
        .login-form { margin-bottom: 30px; }
        a { color: #e67e22; text-decoration: none; }
        label { font-weight: 500; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2 style="text-align: center; color: #9b4b1a; margin-bottom: 30px;"><i class="fas fa-user-cog"></i> Admin Panel</h2>
        
        <form method="POST" action="/admin/login" class="login-form" id="loginForm">
            <label>Password:</label>
            <input type="password" name="password"  required>
            <button type="submit" class="btn">Login</button>
        </form>
        
        <form method="POST" action="/admin/add" id="addForm" style="display: none;">
            <h3 style="color: #b3540c;">➕ Add New Recipe</h3>
            <label>Title:</label>
            <input type="text" name="title" required>
            
            <label>Short Description:</label>
            <input type="text" name="short_desc">
            
            <label>Prep Time:</label>
            <input type="text" name="prep_time" placeholder="e.g. 1h 15min">
            
            <label>Image (Base64 or URL):</label>
            <input type="text" name="image_data" placeholder="Paste Base64 or image URL">
            
            <label>Full Recipe Instructions:</label>
            <textarea name="full_recipe" required placeholder="Detailed steps..."></textarea>
            
            <input type="hidden" name="password" id="adminPwd">
            <button type="submit" class="btn">Publish Recipe</button>
        </form>
        
        <div id="recipesList" style="margin-top: 30px;">
            <h3 style="color: #c25b1a;">📋 Manage Recipes</h3>
            <div id="adminRecipes"></div>
        </div>
        
        <p style="text-align: center; margin-top: 20px;">
            <a href="/"><i class="fas fa-home"></i> Back to Recipes</a>
        </p>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = function(e) {
            if (this.password.value === 'kritos2003') {
                document.getElementById('addForm').style.display = 'block';
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('adminPwd').value = 'kritos2003';
                loadAdminRecipes();
                return false;
            }
        };
        
        async function loadAdminRecipes() {
            try {
                const res = await fetch('/api/recipes');
                const recipes = await res.json();
                let html = '';
                recipes.forEach(r => {
                    html += `
                        <div style="border:1px solid #e2cbb4; padding:15px; margin:10px 0; border-radius:15px; background:white;">
                            <strong>ID: ${r.id} - ${r.title}</strong><br>
                            <small>${r.short_desc}</small>
                            <br><button onclick="deleteRecipe(${r.id})" class="btn" style="background:#c25b1a; padding:8px 16px; width:auto; margin-top:8px;">🗑️ Delete</button>
                        </div>
                    `;
                });
                document.getElementById('adminRecipes').innerHTML = html || '<p>No recipes yet.</p>';
            } catch(e) {
                document.getElementById('adminRecipes').innerHTML = '<p>Error loading recipes.</p>';
            }
        }
        
        async function deleteRecipe(id) {
            if (!confirm('Delete this recipe?')) return;
            try {
                await fetch(`/api/recipes/${id}`, {method: 'DELETE', headers: {'Authorization': 'Basic kritos2003'}});
                loadAdminRecipes();
                alert('Deleted!');
            } catch(e) {
                alert('Delete failed.');
            }
        }
    </script>
</body>
</html>
